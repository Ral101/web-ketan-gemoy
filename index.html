<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ketan Gemoy</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="brand">
    <img src="Logo_Gemoy.jpeg" style="height: 40px;">
    <div class="logoName">Ketan Gemoy</div>
  </div>

  <div style="position: relative;">
    <img src="Cart_logo.png" style="height: 40px; cursor: pointer;" onclick="toggleCart()">
    <span id="cartNotification">0</span>
  </div>
</header>

<div class="container">
  <h2>Menu Pilihan</h2>
  <div class="menu" id="menu"></div>
</div>

<!-- CART -->
<div class="cart" id="cart">
  <button class="close-btn" onclick="toggleCart()">X</button>
  <h3>Keranjang Belanja</h3>
  <div id="cartItems"></div>
  <div class="total">
    <span>Total:</span>
    <span id="total">Rp 0</span>
  </div>
  <button class="btn" onclick="checkout()">Checkout Sekarang</button>
</div>

<!-- CHECKOUT -->

<!--
<div class="modal" id="checkoutModal">
  <button class="close-btn" onclick="closeCheckout()">X</button>

  <input id="nama" placeholder="Nama">
  <input id="wa" placeholder="No WA">

<div class="modal" id="checkoutModal">
  <button class="close-btn" onclick="closeCheckout()">X</button> 
  <h3>Checkout</h3>

  <input id="nama" placeholder="Nama">
  <input id="wa" placeholder="No WA">
  <textarea id="alamat" placeholder="Alamat"></textarea>

  <button class="btn" onclick="getLocation()">Ambil Lokasi 📍</button>
  <p id="lokasiText" style="font-size:12px;color:gray;"></p>

  <button class="btn" onclick="submitOrder()">Kirim</button>
</div>


<footer>
  <div class="footer-content">
    <h3>Contact Us</h3>
    <p>Hubungi kami melalui media sosial berikut:</p>
    <div class="social-links">
      <a href="https://www.instagram.com/ketangemoy" target="_blank">
        <img src="logo_ig.png" class="social-icon">
      </a>
      <a href="https://wa.me/62895372774329" target="_blank">
        <img src="logo_wa.png" class="social-icon">
      </a>
    </div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
